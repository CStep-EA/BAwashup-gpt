# ─────────────────────────────────────────────────────────
# Bower Ag CowCare Tool — Railway Nixpacks Configuration
# Sprint 16: Install ffmpeg for video frame extraction.
# Sprint 18D fix: Removed explicit [phases.install] so
# nixpacks auto-detects Python from requirements.txt and
# creates a venv with pip available.
# ─────────────────────────────────────────────────────────

[phases.setup]
nixPkgs = ['ffmpeg']

[start]
cmd = 'uvicorn app.main:app --host 0.0.0.0 --port $PORT'
